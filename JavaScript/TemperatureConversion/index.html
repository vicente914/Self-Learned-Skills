<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature conversor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <form>
        <h1>Temperature conversion:</h1>

        <input type="number" id="textBox" value="0">

        <div>
            <input type="radio" id="toFarenheit" name="unit">
            <label for="toFarenheit">Celcius -> Farenheit</label>
        </div>

        <div>
            <input type="radio" id="toCelcius" name="unit">
            <label for="toCelcius">Farenheit -> Celcius</label>
        </div>
        

        <button type="button" id="mySubmit" onclick="convert()">submit</button>
        <p id="result"></p>
    </form>

    <script src="index.js"></script>
</body>
</html>
